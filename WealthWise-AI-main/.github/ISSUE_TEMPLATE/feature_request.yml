---
name: ✨ Feature Request
description: Suggest a new feature or enhancement
title: "[FEAT] "
labels: ["enhancement", "needs-triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        ## ✨ Feature Request
        Thanks for your suggestion! Please provide as much detail as possible.

  - type: dropdown
    id: area
    attributes:
      label: Feature Area
      options:
        - Backend API (new endpoint)
        - Frontend UI (new page/component)
        - AI / Gemini Integration
        - OCR Enhancement
        - Analytics / Reporting
        - Authentication / Security
        - Performance Optimization
        - Infrastructure / DevOps
        - Documentation
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve?
      placeholder: "As a user, I want to... so that I can..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the feature you'd like to see implemented.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you considered any alternative approaches?

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - Critical (blocking development)
        - High (important for MVP)
        - Medium (nice to have)
        - Low (future enhancement)
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-submission Checklist
      options:
        - label: I have searched existing issues to avoid duplicates
          required: true
        - label: This feature aligns with the project's goals
          required: true
