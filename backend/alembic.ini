[alembic]
script_location = alembic

# Timestamp-based migration file naming: YYYYMMDD_HHMM_<rev>_<slug>.py
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

prepend_sys_path = .

# SQLAlchemy URL is loaded dynamically from app settings in env.py
# Do NOT put credentials here — use .env file
sqlalchemy.url = postgresql+asyncpg://placeholder/placeholder

[post_write_hooks]
# Optional: auto-format migrations with ruff on generation
# hooks = ruff
# ruff.type = exec
# ruff.entrypoint = ruff
# ruff.options = check --fix REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
